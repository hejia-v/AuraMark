name: build

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/AuraMark.Web/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build frontend
        working-directory: src/AuraMark.Web
        run: |
          npm ci
          npm run build

      - name: Build solution
        working-directory: src
        env:
          CI: "true"
        run: dotnet build AuraMark.sln -c Release
